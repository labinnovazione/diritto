<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diritto Privato dei Mercati Digitali</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f0e0c;
  --surface: #181612;
  --surface2: #201e1a;
  --border: #2a2722;
  --border-light: #38342e;
  --text: #e8e0d0;
  --muted: #7a7060;
  --faint: #3a3630;

  --def: #4a90d9;
  --def-bg: rgba(74,144,217,0.07);
  --def-line: rgba(74,144,217,0.3);
  --def-phrase: rgba(74,144,217,0.13);
  --def-phrase-text: #a0c4ea;

  --arg: #c9963a;
  --arg-bg: rgba(201,150,58,0.07);
  --arg-line: rgba(201,150,58,0.3);
  --arg-phrase: rgba(201,150,58,0.13);
  --arg-phrase-text: #d4b06e;

  --caso: #5aaa7a;
  --caso-bg: rgba(90,170,122,0.07);
  --caso-line: rgba(90,170,122,0.3);
  --caso-phrase: rgba(90,170,122,0.13);
  --caso-phrase-text: #8ecfa8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
header {
  padding: 28px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(15,14,12,0.97);
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.hl h1 {
  font-family: 'Playfair Display', serif;
  font-size: 19px; font-weight: 700;
  letter-spacing: -0.2px; color: var(--text);
}
.hl p {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
  margin-top: 3px; letter-spacing: 0.8px;
}
.hc { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

.btn {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.4px;
  padding: 7px 14px; border-radius: 3px;
  border: 1px solid var(--border-light);
  background: var(--surface2); color: var(--text);
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn:hover { border-color: var(--muted); }
.btn.on { background: var(--arg); color: #0f0e0c; border-color: var(--arg); font-weight: 600; }

input.search {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 7px 12px; border-radius: 3px;
  border: 1px solid var(--border-light);
  background: var(--surface2); color: var(--text);
  outline: none; width: 190px; letter-spacing: 0.3px;
  transition: border-color 0.15s;
}
input.search::placeholder { color: var(--muted); }
input.search:focus { border-color: var(--muted); }

/* LEGEND */
.legend {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 9px 40px;
  display: flex; gap: 24px; align-items: center;
}
.leg {
  display: flex; align-items: center; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.5px; color: var(--muted);
}
.ld { width: 8px; height: 8px; border-radius: 50%; }
.leg-note { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--faint); letter-spacing: 0.3px; }

/* STATS */
.stats {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 7px 40px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
  display: flex; gap: 20px; letter-spacing: 0.4px;
}
.stats span { color: var(--text); }

/* MAIN */
main { max-width: 980px; margin: 0 auto; padding: 0 40px 80px; }

/* CHAPTER */
.chapter { margin-top: 44px; }
.ch-header {
  display: flex; align-items: baseline; gap: 14px;
  padding-bottom: 10px; border-bottom: 1px solid var(--border-light);
  cursor: pointer; user-select: none;
}
.ch-header:hover .ch-title { opacity: 0.75; }
.ch-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1px; min-width: 60px; }
.ch-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; flex: 1; transition: opacity 0.15s; }
.ch-badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }
.ch-arr { color: var(--muted); font-size: 13px; transition: transform 0.2s; }
.chapter.collapsed .ch-arr { transform: rotate(-90deg); }
.chapter.collapsed .ch-body { display: none; }

.ch-body { display: flex; flex-direction: column; gap: 8px; padding-top: 12px; }

/* CHAPTER COLORS */
.chapter[data-c="1"] .ch-title { color: #c87d3a; }
.chapter[data-c="2"] .ch-title { color: #7b9fd4; }
.chapter[data-c="3"] .ch-title { color: #9b77c4; }
.chapter[data-c="4"] .ch-title { color: #5aaa7a; }
.chapter[data-c="5"] .ch-title { color: #d46b6b; }
.chapter[data-c="6"] .ch-title { color: #c9963a; }
.chapter[data-c="7"] .ch-title { color: #4a90d9; }

/* QUESTION CARD */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px; overflow: hidden;
  transition: border-color 0.15s;
}
.q-card:hover { border-color: var(--border-light); }
.q-card.hidden { display: none; }

.q-head {
  display: flex; align-items: baseline; gap: 10px;
  padding: 12px 16px; cursor: pointer;
  border-bottom: 1px solid transparent;
  transition: background 0.1s;
}
.q-head:hover { background: rgba(255,255,255,0.02); }
.q-card.open .q-head { border-bottom-color: var(--border); }
.q-n { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); min-width: 26px; }
.q-t { font-family: 'Source Serif 4', serif; font-size: 14px; font-style: italic; flex: 1; color: var(--text); line-height: 1.4; }
.q-arr { color: var(--muted); font-size: 11px; transition: transform 0.15s; }
.q-card.open .q-arr { transform: rotate(90deg); }

/* BODY */
.q-body { display: none; }
.q-card.open .q-body { display: grid; grid-template-columns: 1fr 1fr 1fr; }

/* BLOCK */
.block {
  padding: 14px 16px;
  border-right: 1px solid var(--border);
}
.block:last-child { border-right: none; }

.block.def { background: var(--def-bg); border-top: 2px solid var(--def-line); }
.block.arg { background: var(--arg-bg); border-top: 2px solid var(--arg-line); }
.block.caso { background: var(--caso-bg); border-top: 2px solid var(--caso-line); }

.block-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; letter-spacing: 1.5px;
  font-weight: 500; text-transform: uppercase;
  display: block; margin-bottom: 10px;
}
.block.def .block-label { color: var(--def); }
.block.arg .block-label { color: var(--arg); }
.block.caso .block-label { color: var(--caso); }

/* PHRASES */
.phrases { display: flex; flex-direction: column; gap: 5px; }

.phrase {
  font-family: 'Source Serif 4', serif;
  font-size: 13px; line-height: 1.5;
  padding: 5px 9px;
  border-radius: 3px;
  position: relative;
}

.block.def .phrase { background: var(--def-phrase); color: var(--def-phrase-text); }
.block.arg .phrase { background: var(--arg-phrase); color: var(--arg-phrase-text); }
.block.caso .phrase { background: var(--caso-phrase); color: var(--caso-phrase-text); }

/* HIDDEN mode */
body.hide-mode .phrase {
  background: var(--faint) !important;
  color: var(--faint) !important;
  cursor: pointer;
  user-select: none;
  border-radius: 3px;
}
body.hide-mode .phrase.shown {
  background: initial !important;
  color: initial !important;
}
body.hide-mode .block.def .phrase.shown { background: var(--def-phrase) !important; color: var(--def-phrase-text) !important; }
body.hide-mode .block.arg .phrase.shown { background: var(--arg-phrase) !important; color: var(--arg-phrase-text) !important; }
body.hide-mode .block.caso .phrase.shown { background: var(--caso-phrase) !important; color: var(--caso-phrase-text) !important; }

/* PROGRESS */
.progress-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 2px; background: var(--border); z-index: 200; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--def), var(--caso)); width: 0%; transition: width 0.3s; }

/* RESPONSIVE */
@media (max-width: 800px) {
  header { padding: 18px 20px; flex-wrap: wrap; }
  main { padding: 0 20px 80px; }
  .legend, .stats { padding-left: 20px; padding-right: 20px; }
  .q-body { grid-template-columns: 1fr; }
  .block { border-right: none; border-bottom: 1px solid var(--border); }
  .block:last-child { border-bottom: none; }
  input.search { width: 130px; }
}
</style>
</head>
<body>

<header>
  <div class="hl">

  <div class="leg"><div class="ld" style="background:var(--caso)"></div>CASO</div>

<main id="mainContent"></main>
