<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diritto Privato dei Mercati Digitali — Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f0e0c;
    --surface: #1a1814;
    --border: #2e2b25;
    --border-light: #3d3930;
    --text: #e8e0d0;
    --muted: #8a8070;
    --accent-def: #4a90d9;
    --accent-arg: #c9963a;
    --accent-caso: #5aaa7a;
    --accent-def-bg: rgba(74,144,217,0.08);
    --accent-arg-bg: rgba(201,150,58,0.08);
    --accent-caso-bg: rgba(90,170,122,0.08);
    --cap-colors: #c87d3a, #7b9fd4, #9b77c4, #5aaa7a, #d46b6b, #c9963a, #4a90d9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(15,14,12,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .header-left h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-left p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
  }

  .header-controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--border-light);
    background: var(--surface);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--muted); background: var(--border); }
  .btn.active { background: var(--accent-arg); color: #0f0e0c; border-color: var(--accent-arg); font-weight: 600; }

  .search-wrap {
    position: relative;
  }
  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 4px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--muted); }

  /* LEGEND */
  .legend {
    display: flex;
    gap: 20px;
    padding: 12px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }

  /* MAIN */
  main { padding: 0 40px 80px; max-width: 1100px; margin: 0 auto; }

  /* CHAPTER */
  .chapter {
    margin-top: 40px;
  }

  .chapter-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0 12px;
    border-bottom: 2px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .chapter-header:hover .chapter-title { opacity: 0.8; }

  .chapter-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    min-width: 60px;
  }
  .chapter-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 600;
    flex: 1;
    transition: opacity 0.15s;
  }
  .chapter-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid currentColor;
    opacity: 0.6;
    color: var(--muted);
  }
  .chapter-toggle {
    font-size: 16px;
    color: var(--muted);
    transition: transform 0.2s;
  }
  .chapter.collapsed .chapter-toggle { transform: rotate(-90deg); }
  .chapter.collapsed .questions-grid { display: none; }

  /* QUESTIONS GRID */
  .questions-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    padding-top: 16px;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .q-card:hover { border-color: var(--border-light); }
  .q-card.hidden { display: none; }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
    padding-top: 2px;
    letter-spacing: 0.5px;
  }
  .q-title {
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    flex: 1;
    font-style: italic;
    color: var(--text);
    line-height: 1.4;
  }
  .q-chevron {
    color: var(--muted);
    font-size: 12px;
    padding-top: 3px;
    transition: transform 0.15s;
  }
  .q-card.open .q-chevron { transform: rotate(90deg); }

  /* KEYWORD BLOCKS */
  .q-keywords {
    display: none;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  .q-card.open .q-keywords { display: grid; }

  .kw-block {
    padding: 12px 16px;
    border-right: 1px solid var(--border);
    position: relative;
  }
  .kw-block:last-child { border-right: none; }

  .kw-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    font-weight: 500;
    margin-bottom: 8px;
    display: block;
    text-transform: uppercase;
  }

  .kw-block.def { background: var(--accent-def-bg); }
  .kw-block.def .kw-label { color: var(--accent-def); }

  .kw-block.arg { background: var(--accent-arg-bg); }
  .kw-block.arg .kw-label { color: var(--accent-arg); }

  .kw-block.caso { background: var(--accent-caso-bg); }
  .kw-block.caso .kw-label { color: var(--accent-caso); }

  .kw-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .kw-tag {
    font-size: 11px;
    line-height: 1.3;
    padding: 3px 7px;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .kw-block.def .kw-tag {
    background: rgba(74,144,217,0.12);
    color: #85b8e8;
    border: 1px solid rgba(74,144,217,0.2);
  }
  .kw-block.arg .kw-tag {
    background: rgba(201,150,58,0.12);
    color: #d4ac6e;
    border: 1px solid rgba(201,150,58,0.2);
  }
  .kw-block.caso .kw-tag {
    background: rgba(90,170,122,0.12);
    color: #7bc49a;
    border: 1px solid rgba(90,170,122,0.2);
  }

  /* SELF-TEST MODE */
  body.test-mode .kw-tag {
    background: var(--border) !important;
    color: var(--border) !important;
    border-color: var(--border) !important;
    cursor: pointer;
    user-select: none;
  }
  body.test-mode .kw-tag.revealed {
    background: initial !important;
    color: initial !important;
    border-color: initial !important;
  }
  body.test-mode .kw-block.def .kw-tag.revealed {
    background: rgba(74,144,217,0.12) !important;
    color: #85b8e8 !important;
    border: 1px solid rgba(74,144,217,0.2) !important;
  }
  body.test-mode .kw-block.arg .kw-tag.revealed {
    background: rgba(201,150,58,0.12) !important;
    color: #d4ac6e !important;
    border: 1px solid rgba(201,150,58,0.2) !important;
  }
  body.test-mode .kw-block.caso .kw-tag.revealed {
    background: rgba(90,170,122,0.12) !important;
    color: #7bc49a !important;
    border: 1px solid rgba(90,170,122,0.2) !important;
  }

  /* PROGRESS */
  .progress-bar {
    height: 2px;
    background: var(--border);
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 200;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-arg), var(--accent-caso));
    width: 0%;
    transition: width 0.3s;
  }

  /* STATS BAR */
  .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    padding: 8px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    letter-spacing: 0.5px;
  }
  .stats span { color: var(--text); }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    header { padding: 24px 20px; flex-wrap: wrap; }
    main { padding: 0 20px 80px; }
    .legend { padding: 10px 20px; flex-wrap: wrap; gap: 12px; }
    .stats { padding: 8px 20px; }
    .q-keywords { grid-template-columns: 1fr; }
    .kw-block { border-right: none; border-bottom: 1px solid var(--border); }
    .kw-block:last-child { border-bottom: none; }
    .search-wrap input { width: 140px; }
  }

  /* CHAPTER COLOR ACCENTS */
  .chapter[data-cap="1"] .chapter-title { color: #c87d3a; }
  .chapter[data-cap="2"] .chapter-title { color: #7b9fd4; }
  .chapter[data-cap="3"] .chapter-title { color: #9b77c4; }
  .chapter[data-cap="4"] .chapter-title { color: #5aaa7a; }
  .chapter[data-cap="5"] .chapter-title { color: #d46b6b; }
  .chapter[data-cap="6"] .chapter-title { color: #c9963a; }
  .chapter[data-cap="7"] .chapter-title { color: #4a90d9; }
</style>
</head>

<header>
  <div class="header-left">
    <h1>Diritto Privato dei Mercati Digitali</h1>
    <p>66 DOMANDE · PAROLE CHIAVE · CASI GIUDIZIARI</p>
  </div>
  <div class="header-controls">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Cerca domanda o caso…">
    </div>
    <button class="btn" id="expandAll">ESPANDI TUTTO</button>
    <button class="btn" id="collapseAll">CHIUDI TUTTO</button>
    <button class="btn" id="testMode">🎯 SELF-TEST</button>
  </div>
</header>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4a90d9"></div>DEFINIZIONE</div>
  <div class="legend-item"><div class="legend-dot" style="background:#c9963a"></div>ARGOMENTAZIONE</div>
  <div class="legend-item"><div class="legend-dot" style="background:#5aaa7a"></div>CASO GIUDIZIARIO</div>

<div class="stats">
  <div>DOMANDE VISIBILI: <span id="visibleCount">66</span></div>

  <div id="testStats" style="display:none">RIVELATE: <span id="revealedCount">0</span> / <span id="totalTags">0</span></div>

<main id="mainContent"></main>

<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    {n:36, t:"Natura giuridica degli Smart Contract — tesi contrattualista vs non contrattualista",

  {cap:5, title:"La Proprietà nei Mercati Digitali", questions:[

// Render
function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  let totalTags = 0;

  DATA.forEach(ch => {
    const chDiv = document.createElement('div');
    chDiv.className = 'chapter';
    chDiv.setAttribute('data-cap', ch.cap);
    chDiv.setAttribute('data-chapter', ch.cap);

    const qCount = ch.questions.length;
    chDiv.innerHTML = `
      <div class="chapter-header" onclick="toggleChapter(this)">
        <span class="chapter-num">CAP. ${ch.cap}</span>
        <span class="chapter-title">${ch.title}</span>
        <span class="chapter-badge">${qCount} domande</span>
        <span class="chapter-toggle">▾</span>
      </div>
      <div class="questions-grid" id="ch${ch.cap}grid"></div>`;
    main.appendChild(chDiv);

    const grid = chDiv.querySelector('.questions-grid');
    ch.questions.forEach(q => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.setAttribute('data-n', q.n);
      card.setAttribute('data-search', (q.t + ' ' + q.def.join(' ') + ' ' + q.arg.join(' ') + ' ' + q.caso.join(' ')).toLowerCase());

      const defTags = q.def.map(k => `<span class="kw-tag">${k}</span>`).join('');
      const argTags = q.arg.map(k => `<span class="kw-tag">${k}</span>`).join('');
      const casoTags = q.caso.map(k => `<span class="kw-tag">${k}</span>`).join('');
      totalTags += q.def.length + q.arg.length + q.caso.length;

      card.innerHTML = `
        <div class="q-header" onclick="toggleCard(this.parentElement)">
          <span class="q-num">${q.n}.</span>
          <span class="q-title">${q.t}</span>
          <span class="q-chevron">▶</span>
        </div>
        <div class="q-keywords">
          <div class="kw-block def">
            <span class="kw-label">Definizione</span>
            <div class="kw-tags">${defTags}</div>
          </div>
          <div class="kw-block arg">
            <span class="kw-label">Argomentazione</span>
            <div class="kw-tags">${argTags}</div>
          </div>
          <div class="kw-block caso">
            <span class="kw-label">Caso Giudiziario</span>
            <div class="kw-tags">${casoTags}</div>
          </div>
        </div>`;
      grid.appendChild(card);
    });
  });

  document.getElementById('totalTags').textContent = totalTags;
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function toggleChapter(header) {
  header.closest('.chapter').classList.toggle('collapsed');
}

// Search
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let visible = 0;
  document.querySelectorAll('.q-card').forEach(card => {
    const match = !q || card.getAttribute('data-search').includes(q);
    card.classList.toggle('hidden', !match);
    if (match) visible++;
    if (match && q) card.classList.add('open');
  });
  document.getElementById('visibleCount').textContent = visible;
});

// Expand/Collapse all
document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.q-card:not(.hidden)').forEach(c => c.classList.add('open'));
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('collapsed'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.chapter').forEach(c => c.classList.add('collapsed'));
});

// Test mode
let testActive = false;
document.getElementById('testMode').addEventListener('click', function() {
  testActive = !testActive;
  document.body.classList.toggle('test-mode', testActive);
  this.classList.toggle('active', testActive);
  this.textContent = testActive ? '✅ ESCI DAL TEST' : '🎯 SELF-TEST';
  document.getElementById('testStats').style.display = testActive ? 'block' : 'none';
  if (!testActive) {
    document.querySelectorAll('.kw-tag').forEach(t => t.classList.remove('revealed'));
    updateRevealedCount();
  }
});

document.addEventListener('click', function(e) {
  if (testActive && e.target.classList.contains('kw-tag')) {
    e.target.classList.toggle('revealed');
    updateRevealedCount();
  }
});

function updateRevealedCount() {
  const revealed = document.querySelectorAll('.kw-tag.revealed').length;
  document.getElementById('revealedCount').textContent = revealed;
  const total = parseInt(document.getElementById('totalTags').textContent);
  document.getElementById('progressFill').style.width = (revealed/total*100) + '%';
}

// Init
render();
</script>
