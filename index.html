    "Teoria dello Stato Innovatore (Mazzucato): l'innovazione ha carattere cumulativo e collettivo; la ricerca di base — ad alto rischio — è finanziata dallo Stato.",
    "La conoscenza è un bene non rivale: la sua massima diffusione genera benefici sociali enormi, ma la PI crea escludibilità artificiale come incentivo.",
   ],
   arg:[
    "Se l'innovazione è cumulativa e collettiva, l'architettura dei diritti di proprietà intellettuale appare ingiustificatamente estesa a favore dei privati.",
    "Allungare i monopoli legali oltre il necessario frena l'innovazione cumulativa e traduce in appropriazione privata benefici originati collettivamente.",
    "Il paradosso: la PI è necessaria come incentivo alla creazione, ma troppa PI distrugge l'innovazione cumulativa che presuppone l'accesso libero alle idee.",
   ],
   caso:[
    "Copyright Term Extension Act (USA, 1998): estensione retroattiva di 20 anni dei diritti d'autore su opere storiche già redditizie.",
    "Spinto dalle lobbies della Disney per posticipare l'ingresso di Topolino nel pubblico dominio: nessuna giustificazione come incentivo a future innovazioni.",
    "Il caso dimostra plasticamente la cattura del regolatore: la norma protegge il monopolista, non stimola l'innovazione.",
   ]},
 ]},
 {c:2, title:"Diritto e Mercati Digitali", qs:[
  {n:11, t:"Regolabilità della rete — Code is Law — DRM",
   def:[
    "Code is Law (Lessig): nell'ecosistema digitale la vera norma non deriva solo dai legislatori statali, ma è scritta nel codice informatico e nell'architettura degli spazi virtuali.",
    "Un divieto imposto dal codice si auto-esegue: inibisce tecnicamente l'azione in modo insuperabile, prima ancora che l'individuo possa scegliere di violarla.",
    "A differenza della legge ordinaria — che si può violare subendo la sanzione ex post — il codice preclude fisicamente il comportamento.",
   ],
   arg:[
    "L'evoluzione tecnica (cookie, HTML5, geoblocking) ha trasformato la rete da spazio anonimo a spazio perennemente identificabile e iper-sorvegliato.",
    "L'anonimato strutturale degli anni '90 (cyberlibertarianismo) è un'illusione superata: TCP/IP + cookie + cloud rendono ogni utente tracciabile.",
    "I privati sconfiggono tecnologicamente il diritto statale: i DRM precludono usi che sarebbero legalmente leciti secondo le norme del diritto d'autore.",
   ],
   caso:[
    "I DRM (Digital Rights Management) sono l'esempio emblematico di Code is Law: misure crittografiche che bloccano automaticamente la copia, la modifica e la ridistribuzione.",
    "I DRM precludono anche il fair use legalmente garantito (critica, parodia, didattica): il codice è più potente della legge.",
    "Lessig: il legislatore perde il controllo della norma quando il codice privatistico diventa il vero regolatore dello spazio digitale.",
   ]},
  {n:12, t:"Fallimento del mercato — asimmetrie informative — esternalità",
   def:[
    "Il fallimento del mercato si verifica quando il mercato non riesce ad allocare le risorse in modo efficiente, legittimando l'intervento regolatorio pubblico.",
    "Le cause principali: asimmetrie informative (venditore sa più del compratore), esternalità (costi su terzi non internalizzati nel prezzo), scostamenti dalla razionalità individuale.",
    "Nei mercati digitali l'asimmetria informativa è strutturalmente abissale: le piattaforme accumulano Big Data sugli utenti, profilandoli in modo opaco.",
   ],
   arg:[
    "La 'tirannia delle piccole decisioni': l'effetto cumulativo di infinite transazioni lecite (es. Airbnb) sfigura le città, danneggiando i residenti senza che nessuno lo abbia deciso.",
    "Le esternalità digitali sono spesso negative e invisibili: raccolta massiva di dati, dipendenze comportamentali, polarizzazione del discorso pubblico.",
    "Il rimedio: internalizzare le esternalità obbligando l'impresa a farsi carico dell'impatto prodotto sulla società (tassazione, obblighi di riparazione).",
   ],
   caso:[
    "Akerlof (1970): il 'mercato dei lemons' (auto usate) illustra la selezione avversa causata dall'asimmetria informativa.",
    "L'acquirente non distingue il peach (auto buona) dal lemon (bidone) e offre un prezzo medio: i venditori di auto buone si ritirano.",
    "Rimane solo la coda bassa del mercato: la selezione avversa porta al collasso progressivo della qualità media dell'offerta.",
   ]},
  {n:13, t:"Fallimenti dello Stato — Public Choice — cattura del regolatore",
   def:[
    "La scuola della Public Choice: il legislatore e i burocrati sono agenti razionali che tendono a massimizzare la propria utilità, non il bene collettivo.",
    "I fallimenti dello Stato: l'azione governativa genera inefficienze strutturali proprie, non meno dannose dei fallimenti del mercato.",
    "La cattura del regolatore (Stigler): le istituzioni patiscono un gap informativo rispetto all'industria ad alta specializzazione; potenti gruppi d'interesse cooptano le agenzie pubbliche.",
   ],
   arg:[
    "Le revolving doors: il funzionario pubblico passa all'industria regolata (e viceversa), portando con sé relazioni e informazioni privilegiate.",
    "Le norme approvate 'in nome della protezione pubblica' finiscono per creare barriere all'ingresso per i nuovi entranti, a vantaggio degli incumbent.",
    "Il lobbying come spreco di risorse: le imprese investono in influenza politica invece che in produttività, distorcendo l'allocazione dell'economia.",
   ],
   caso:[
    "Il caso Uber e Airbnb come cattura del regolatore: tassisti e albergatori attivano pressioni di lobbying sui legislatori per bloccare le piattaforme.",
    "Gli obblighi anacronistici imposti alle piattaforme non tutelano la sicurezza pubblica: preservano le rendite di posizione delle categorie preesistenti.",
    "L'ironia: le categorie colpite non competono sul servizio (che sarebbe peggiore), ma competono nel catturare il regolatore.",
   ]},
  {n:14, t:"Dilemma di Collingridge — normazione sperimentale — co-regolazione",
   def:[
    "Il Dilemma di Collingridge: fissare regole quando la tecnologia è agli albori è facile ma espone a errori colossali (gli impatti non sono ancora decifrabili).",
    "Aspettare che la tecnologia sia matura elimina il rischio di errore valutativo, ma rende l'intervento di contenimento politicamente oneroso o impossibile.",
    "La normazione sperimentale risolve lo stallo: clausole di scadenza che impongono revisioni periodiche dinamiche sincronizzate all'evoluzione tecnologica.",
   ],
   arg:[
    "La neutralità tecnologica: dettare prescrizioni valide per un problema sociale a prescindere dal software impiegato, per non creare obsolescenza normativa immediata.",
    "La co-regolazione: lo Stato fissa il fine pubblico, i privati esperti del settore gestiscono l'applicazione materiale grazie alla loro expertise tecnica.",
    "L'autoregolazione: i destinatari del mercato digitale formulano autonomamente standard civici flessibili, più aggiornati della legislazione statale.",
   ],
   caso:[
    "Il Dieselgate (2015): Volkswagen introduce nel motore un software che riconosce il ciclo di prova emissioni e si adatta, falsando i risultati del test.",
    "Le autorità misuravano gas materiale: erano totalmente cieche davanti alla manipolazione algoritmica del software.",
    "Il caso dimostra plasticamente che le normative della società analogica sono inadeguate a governare entità informatiche invisibili.",
   ]},
  {n:15, t:"Fiducia nei mercati digitali — segnali credibili — Lex Mercatoria",
   def:[
    "Nei mercati digitali si traffica tra estranei a distanze oceaniche senza la protezione di un giudice statale tempestivo: serve un ecosistema fiduciario alternativo.",
    "I segnali credibili: un segnale è degno di fede solo se presenta una correlazione inversa fra costo di emissione e qualità del mittente — costoso da simulare per chi è disonesto.",
    "I sistemi reputazionali digitali (rating peer review generato dagli utenti): una cattiva nomea causa smacchi d'affari enormi, agendo come 'seconda mano invisibile'.",
   ],
   arg:[
    "Lo stigma reputazionale è più efficace di qualunque processo giudiziario: il cattivo venditore viene ostracizzato dal mercato in tempo reale.",
    "La garanzia volontaria è un segnale credibile: è enormemente costosa e deleteria da simulare per un operatore incauto, garantendo la genuinità per l'acquirente.",
    "Il limite: le recensioni possono essere falsificate (es. mercato delle recensioni false su Amazon), corrompendo l'integrità del sistema reputazionale.",
   ],
   caso:[
    "La Lega dei Mercanti Magrebini medievale: commercianti ebrei del Mediterraneo costruirono una fiducia incrollabile sul passaparola, senza alcun sistema giudiziario statale sovranazionale.",
    "Chi frodava veniva isolato per sempre dal circuito commerciale: lo stesso meccanismo del rating eBay che decreta la morte commerciale del venditore disonesto.",
    "L'analogia storica dimostra che la fiducia nei mercati transazionali può essere costruita su meccanismi privatistici reputazionali, senza l'intervento dello Stato.",
   ]},
  {n:16, t:"Costi di transazione di Coase — disintegrazione verticale — crowdsourcing",
   def:[
    "Coase (Nobel): l'organizzazione della produzione ruota intorno all'alternativa make (produrre con dipendenti) o buy (acquistare all'esterno con contratti).",
    "La scelta dipende dai costi transattivi: ricerca della controparte, negoziazione, stipula, monitoraggio e enforcement del contratto.",
    "Il digitale ha abbattuto radicalmente i costi di comunicazione e controllo a distanza: il buy diventa sistematicamente più conveniente del make.",
   ],
   arg:[
    "Il modello '900: l'impresa integrata verticalmente per esercitare controllo diretto sui dipendenti e abbattere il rischio di comportamenti opportunistici.",
    "La disintegrazione verticale: il digitale rende più efficiente esternalizzare (buy) perché i costi di transazione sul mercato sono crollati.",
    "Il crowdsourcing: l'impresa esternalizza compiti complessi a una 'folla' disaggregata globale, risparmiando i costi fissi e gerarchici della fabbrica.",
   ],
   caso:[
    "Amazon Mechanical Turk: l'impresa esternalizza micro-compiti a una folla disaggregata globale, acquistando i risultati a costi irrisori.",
    "Waze: la saggezza della folla costruisce la mappa del traffico in tempo reale — superiore alle mappe statiche degli esperti centralizzati.",
    "Entrambi i casi dimostrano che il digitale ha spostato strutturalmente l'equilibrio make/buy verso l'outsourcing sistematico.",
   ]},
  {n:17, t:"Commons based peer production — motivazioni intrinseche — crowding out",
   def:[
    "La commons based peer production (Benkler): una vasta comunità contribuisce volontariamente alla creazione di beni immateriali in un regime di libero accesso.",
    "I due requisiti tecnici: modularità (il progetto si scompone in parti autonome lavorabili separatamente) e granularità (i contributi minimi sono sufficienti e utili).",
    "Gli individui non collaborano per massimizzare il proprio conto in banca ma per motivazioni intrinseche: sfida intellettuale, piacere, costruzione della reputazione sociale.",
   ],
   arg:[
    "L'effetto crowding out (spiazzamento): inserire incentivi monetari in dinamiche di CBPP è letale — corrompono la genuinità civica e distruggono la cooperazione.",
    "Esempio: pagare le persone per donare il sangue riduce le donazioni volontarie — il denaro esternalizza una motivazione che era intrinseca.",
    "La CBPP smonta il mito dell'homo oeconomicus: gli individui collaborano per ragioni che il modello del massimizzatore razionale non riesce a spiegare.",
   ],
   caso:[
    "Wikipedia: enciclopedia costruita senza alcuna direzione editoriale centrale, da milioni di volontari mossi da motivazioni intrinseche.",
    "Linux: sistema operativo open source sviluppato dalla community — oggi il principale sistema operativo usato a livello server mondiale.",
    "Entrambi dimostrano la superiorità dell'autoselezione dei compiti rispetto all'assegnazione gerarchica: chi sceglie cosa fare produce meglio.",
   ]},
 ]},
 {c:3, title:"Piattaforme, Concorrenza e Mercati", qs:[
  {n:18, t:"Mercati bilaterali — dilemma uovo/gallina — legge dell'unico prezzo",
   def:[
    "Mercato bilaterale: la piattaforma si pone come intermediario tra due o più gruppi di utenti distinti ma interdipendenti, facilitandone l'incontro e lo scambio.",
    "Il dilemma dell'uovo e della gallina: per attirare viaggiatori servono albergatori, ma gli albergatori si iscrivono solo se c'è un vasto bacino di viaggiatori.",
    "La legge dell'unico prezzo (o dei beni complementari): abbattendo il prezzo del bene complementare, esplode la domanda del bene primario.",
   ],
   arg:[
    "La flessibilità della domanda determina quale lato sussidiare: si sceglie il lato più elastico (più sensibile al prezzo) per innescare il mercato.",
    "I switching costs artificialmente elevati creano il lock-in: ecosistemi integrati rendono il passaggio al concorrente economicamente svantaggioso.",
    "Il multihoming (uso contemporaneo di più piattaforme) è la risposta competitiva al lock-in: gli utenti non devono scegliere esclusivamente una piattaforma.",
   ],
   caso:[
    "Google distribuisce Android agli sviluppatori a costo zero: abbatte il prezzo dell'hardware, inonda il mercato di smartphone Android.",
    "L'obiettivo non è guadagnare sul sistema operativo ma spingere miliardi di utenti verso il motore di ricerca preinstallato.",
    "Il mercato publicitario è il vero 'bene primario': Android è il bene complementare il cui prezzo zero massimizza gli introiti publicitari.",
   ]},
  {n:19, t:"Esternalità di rete — rendimenti di scala — lock-in — winner takes all",
   def:[
    "Winner takes all: i mercati digitali tendono strutturalmente alla monopolizzazione per effetto della confluenza di tre forze.",
    "Esternalità di rete: l'utilità del servizio cresce esponenzialmente all'aumentare degli utenti — chi è primo attira tutti gli altri.",
    "Rendimenti di scala sui dati: più dati → algoritmo migliore → vantaggio incolmabile per i concorrenti con meno dati.",
   ],
   arg:[
    "Le esternalità di rete incrociate: la crescita di un lato del mercato genera un vantaggio smisurato per l'altro lato.",
    "Il lock-in: la piattaforma costruisce ecosistemi integrati e interdipendenti che rendono il passaggio al rivale economicamente o socialmente svantaggioso.",
    "Il multihoming come antidoto: normative che impongono l'interoperabilità abbassano i switching costs e contrastano la monopolizzazione.",
   ],
   caso:[
    "Facebook: ogni nuovo utente aumenta l'utilità per tutti gli altri (esternalità di rete) — il social network più grande vince strutturalmente.",
    "Google Search: ogni nuova query perfeziona l'algoritmo rendendolo imbattibile — vantaggio che i concorrenti non possono colmare.",
    "Amazon: più venditori attraggono più compratori, che attraggono più venditori — spirale autocatalítica verso il monopolio del marketplace.",
   ]},
  {n:20, t:"Lavoro nella Gig Economy — Caso Foodora — Direttiva 2024/2831",
   def:[
    "La Gig Economy si avvale di lavoratori 'a chiamata' (rider) in una zona grigia contrattuale tra lavoro autonomo, subordinato e un ipotetico 'tertium genus'.",
    "La Direttiva 2024/2831 introduce il 'primato dei fatti': si guarda a come il rapporto è effettivamente svolto nella pratica, non al nome del contratto.",
    "Presunzione relativa di subordinazione (art. 5): al ricorrere di determinati indicatori, il rapporto è presunto subordinato — l'onere della prova si sposta sulla piattaforma.",
   ],
   arg:[
    "La piattaforma che fissa tariffe, assegna corse, controlla la condotta e irroga sanzioni disciplinari tramite algoritmo esercita influenza decisiva sulla prestazione.",
    "Il 'tertium genus' è stato definitivamente respinto dalla Cassazione italiana: il diritto non tollera zone grigie che eludano le tutele lavorative.",
    "L'art. 5 Direttiva: la piattaforma deve dimostrare che il rapporto non è subordinato — l'onere della prova è ribaltato a tutela del lavoratore.",
   ],
   caso:[
    "Cass. n. 1663/2020 — Caso Foodora: la Corte di Cassazione italiana applica l'art. 2 d.lgs. 81/2015 sulle collaborazioni etero-organizzate.",
    "Il principio: se la piattaforma decide i tempi e le modalità della prestazione attraverso l'applicazione, al fattorino si estendono le tutele del lavoro subordinato.",
    "Il Caso Foodora chiude definitivamente la questione del 'terzo genere': non esiste una via di mezzo che giustifichi l'elusione delle tutele lavorative.",
   ]},
  {n:21, t:"Il soggetto che eroga il 'servizio sottostante' — Uber Spain / Airbnb Ireland",
   def:[
    "Contratti SSI (d.lgs. 70/2003): servizi immateriali a distanza e per via elettronica — disciplinati dal diritto del commercio elettronico.",
    "Contratti per il 'servizio sottostante': la prestazione materiale (trasporto, alloggio) intermediata dalla piattaforma — disciplinata dalla normativa settoriale specifica.",
    "Il criterio discriminante (Commissione UE, Comunicazione 356/2016): chi esercita 'influenza decisiva' sulla prestazione eroga materialmente il servizio sottostante.",
   ],
   arg:[
    "Indicatori di 'influenza decisiva': la piattaforma stabilisce il prezzo finale, impone istruzioni vincolanti agli esecutori, detiene i beni essenziali per la prestazione.",
    "Se la piattaforma eroga il servizio sottostante → responsabilità diretta + normativa settoriale (licenze taxi, normativa alberghiera) applicabile.",
    "La distinzione è vitale per determinare se imporre alla piattaforma il rispetto di licenze, concessioni e obblighi tipici dei settori regolamentati.",
   ],
   caso:[
    "Uber Spain (CGUE C-434/15, 2017): Uber assegna inderogabilmente le corse, determina autoritativamente le tariffe e controlla la condotta dei driver.",
    "La CGUE qualifica Uber come 'servizio di trasporto' — non come SSI — rendendolo soggetto alle normative comunali sui taxi e alle licenze.",
    "Airbnb Ireland (CGUE C-390/18, 2019): Airbnb non fissa il prezzo degli affitti né costituisce l'unico canale esclusivo per affittare → qualificato come SSI.",
   ]},
  {n:22, t:"Antitrust e dati — fusioni data-driven — Caso Meta (C-252/21)",
   def:[
    "Nei mercati digitali i dati sono il principale asset concorrenziale: chi li possiede in massa costruisce barriere all'ingresso incolmabili per i concorrenti.",
    "Le fusioni 'data-driven' tra piattaforme devono essere scrutinate per valutare se l'unione dei dataset crei un monopolio sui dati stesso.",
    "La svolta: la violazione del GDPR nella raccolta dei dati può costituire un elemento dell'abuso di posizione dominante — antitrust e privacy convergono.",
   ],
   arg:[
    "Il Bundeskartellamt tedesco (2019): inibisce a Facebook il 'data grabbing' tra Instagram, WhatsApp e siti terzi senza consenso — antitrust + GDPR.",
    "La CGUE (C-252/21, 2023): un'autorità antitrust può e deve verificare se la piattaforma dominante violi il GDPR nella raccolta dei dati.",
    "La base giuridica della 'necessità contrattuale' non può essere invocata strumentalmente per legittimare trattamenti non indispensabili all'esecuzione del contratto.",
   ],
   caso:[
    "Meta v. Bundeskartellamt (CGUE C-252/21, 2023): il trattamento dei 'dati off' (navigazione su Instagram, WhatsApp e siti terzi) non trova fondamento nella necessità contrattuale.",
    "Tali dati servono esclusivamente alla profilazione publicitaria, non all'esecuzione del contratto di accesso al social network.",
    "La CGUE sancisce: la posizione dominante di Meta comprime la libertà di scelta dell'utente, rendendo il consenso strutturalmente non libero.",
   ]},
  {n:23, t:"Pratiche leganti e self-preferencing — Microsoft / Google Shopping / Enel JuicePass",
   def:[
    "Tying e bundling: fornitura del servizio principale condizionata all'acquisto di un servizio secondario — estensione del monopolio ai mercati adiacenti.",
    "Self-preferencing: alterazione fraudolenta degli algoritmi per privilegiare i propri prodotti nelle classifiche a danno dei concorrenti.",
    "Il DMA (art. 5) ha codificato questi divieti come obblighi self-executing per i Gatekeeper: automaticamente applicabili, senza possibilità di negoziazione.",
   ],
   arg:[
    "Il self-preferencing è particolarmente insidioso: l'utente non sa che i risultati che vede sono stati falsati algoritmicamente a proprio danno.",
    "Il tying sfrutta il monopolio del sistema operativo per escludere i concorrenti dai mercati adiacenti (browser, player multimediali, mappe).",
    "L'antitrust tradizionale interviene ex post e lentamente; il DMA introduce obblighi ex ante che non richiedono la prova dell'abuso.",
   ],
   caso:[
    "Microsoft (1998/2004): impone l'installazione forzata di Internet Explorer e Windows Media Player su Windows — esclude Netscape e Sun.",
    "Google Shopping (2017): la Commissione infligge 2,4 miliardi di euro di multa per aver falsato le pagine di ricerca privilegiando il proprio comparatore.",
    "AGCM vs Google/Enel JuicePass: Google rifiuta di accettare l'app Enel JuicePass su Android Auto, favorendo Google Maps — sanzionato per abuso di posizione dominante.",
   ]},
  {n:24, t:"Collusione algoritmica — comportamenti paralleli — Tompkins / Eturas",
   def:[
    "Il diritto antitrust punisce i cartelli (accordi collusivi espliciti) ma ritiene leciti i 'comportamenti paralleli' (scelte autonome convergenti in un oligopolio).",
    "La collusione algoritmica rende obsoleto questo confine formale: algoritmi di monitoring e signaling coordinano i prezzi istantaneamente senza alcun incontro fisico.",
    "Il test di 'consapevolezza' nell'adottare l'algoritmo come strumento di coordinamento è ora il cuore del giudizio antitrust.",
   ],
   arg:[
    "Monitoring algorithms: aggiornano i prezzi in tempo reale monitorando i concorrenti — instaurano cartelli stabili senza che i manager si siano mai incontrati.",
    "Signaling algorithms: trasmettono ai concorrenti le proprie intenzioni di prezzo, consentendo il coordinamento tacito.",
    "L'ironia: l'automatismo abbassa il prezzo per ciascuna singola impresa, ma l'effetto aggregato è il cartello più efficiente della storia.",
   ],
   caso:[
    "US v. Tompkins (2015): i venditori di poster su Amazon avevano adottato segretamente lo stesso algoritmo di terze parti per fissare prezzi massimi garantiti.",
    "Il DOJ ha sventato l'illusione che l'assenza di un accordo umano esplicito escluda la collusione: l'adozione consapevole dell'algoritmo è l'accordo.",
    "Caso Eturas (CGUE C-74/14): software agenzie di viaggio con tetto massimo agli sconti — la CGUE delinea i confini della 'consapevolezza' nell'adozione tecnica.",
   ]},
  {n:25, t:"Digital Markets Act (DMA) — obblighi del Gatekeeper",
   def:[
    "Il DMA (Reg. UE 2022/1925) ribalta il paradigma antitrust: interviene ex ante con obblighi preventivi, senza attendere che il monopolio si consolidi.",
    "È Gatekeeper chi: ha fatturato UE > 7,5 miliardi o capitalizzazione > 75 miliardi + eroga servizi di piattaforma a > 45 milioni di utenti finali e 10.000 utenti commerciali per 3 anni.",
    "Obblighi self-executing (art. 5): immediatamente applicabili, senza necessità di ulteriore specificazione — il Gatekeeper non può negoziare.",
   ],
   arg:[
    "Art. 5 vieta: clausole MFN (che impedivano ai venditori di offrire prezzi diversi su altri canali), tying, data grabbing tra servizi senza consenso.",
    "Art. 6 impone: interoperabilità, accesso ai dati publicitari per inserzionisti, portabilità dei dati, no self-preferencing.",
    "Il DMA come risposta alla lentezza dell'antitrust: le sanzioni ex post arrivavano dopo anni durante i quali il monopolio si era consolidato irrimediabilmente.",
   ],
   caso:[
    "Gatekeeper designati: Alphabet (Google), Amazon, Meta, Apple, ByteDance (TikTok), Microsoft.",
    "La Commissione ha poteri di intervento straordinari: atti delegati, atti di esecuzione, sanzioni strutturali fino allo smembramento dell'impresa.",
    "Il DMA non richiede la prova dell'abuso: le soglie quantitative creano una presunzione relativa che il Gatekeeper distorca la concorrenza.",
   ]},
  {n:26, t:"Capitalismo della sorveglianza (Zuboff) — Caso Dieselgate",
   def:[
    "Il capitalismo della sorveglianza (Zuboff): l'informazione comportamentale umana (clic, accessi, preferenze) diventa il 'nuovo petrolio' della produzione industriale.",
    "I servizi 'gratis' non sono gratuiti: vengono concessi per tracciare e immagazzinare un 'surplus comportamentale' usato per prevedere e modificare il comportamento degli utenti.",
    "Il modello di business: raccogliere dati → costruire modelli predittivi → vendere previsioni del comportamento agli inserzionisti.",
   ],
   arg:[
    "Il Dieselgate dimostra l'inadeguatezza normativa: i controlli fisici tradizionali sono ciechi davanti alla manipolazione algoritmica del software.",
    "Le normative della società analogica sono strutturalmente inadeguate a governare entità informatiche 'invisibili'.",
    "Cambridge Analytica: la profilazione comportamentale non serve solo per la publicità — può alterare preferenze politiche e minacciare la democrazia.",
   ],
   caso:[
    "Dieselgate (2015): Volkswagen introduce nel motore un software che riconosce il ciclo di prova delle emissioni e riduce le emissioni nocive durante il test.",
    "Nella guida reale le emissioni erano fino a 40 volte superiori ai limiti legali: le autorità misuravano gas materiale, non potevano rilevare la manipolazione.",
    "Il caso è il paradigma dell'inadeguatezza del diritto analogico: il software è il nuovo territorio della frode, invisibile agli strumenti di controllo tradizionali.",
   ]},
  {n:27, t:"Monopsonio — Gig Economy e mercato del lavoro",
   def:[
    "Il monopsonio è la struttura di mercato speculare al monopolio: un solo (o pochissimi) gigantesco acquirente sul versante della domanda, moltitudine di venditori.",
    "Nella Gig Economy le piattaforme di delivery e trasporto costituiscono spesso un monopsonio geografico nel loro specifico raggio d'attività.",
    "Il rider non ha potere negoziale: si trova faccia a faccia con l'unica piattaforma in grado di acquistargli il servizio — prendere o lasciare.",
   ],
   arg:[
    "La piattaforma monopsonista comprime i salari al ribasso e scarica il rischio d'impresa sui lavoratori: costi di manutenzione, carburante, assicurazione.",
    "L'esercito di sostituti sempre disponibili (disoccupati disposti ad accettare l'incarico) amplia il potere contrattuale della piattaforma.",
    "Nella Silicon Valley: i patti di non concorrenza inter-aziendali hanno costruito un monopsonio coordinato sul mercato degli ingegneri informatici.",
   ],
   caso:[
    "US v. Adobe/Apple/Google/Intel (DOJ, 2010): le aziende della Silicon Valley avevano siglato accordi segreti 'no poach' — non sottrarsi vicendevolmente ingegneri.",
    "Il patto paralizzava la mobilità salariale degli ingegneri: impossibilitati a cambiare azienda per avere un salario migliore.",
    "La California vieta i patti di non concorrenza — e non a caso ospita l'ecosistema tecnologico più dinamico e innovativo del mondo.",
   ]},
 ]},
 {c:4, title:"I Contratti nei Mercati Digitali", qs:[
  {n:28, t:"SSI vs servizio sottostante — disciplina applicabile",
   def:[
    "SSI (d.lgs. 70/2003): servizi immateriali forniti a distanza e per via elettronica — indipendentemente dal fatto che l'utente sia professionista o consumatore.",
    "Servizio sottostante: la prestazione materiale (trasporto, alloggio, consegna) intermediata dalla piattaforma — disciplinata dalla normativa settoriale.",
    "Il discrimine: la piattaforma che esercita 'influenza decisiva' sulla prestazione eroga materialmente il servizio sottostante e ne risponde direttamente.",
   ],
   arg:[
    "Se l'utente è un consumatore, ai contratti SSI si sommano le tutele del Codice del Consumo — protezione rafforzata nelle transazioni B2C.",
    "La disciplina del servizio sottostante varia settore per settore: normativa sui taxi, normativa alberghiera, normativa sulla sicurezza alimentare per il delivery.",
    "La stessa piattaforma può erogare contemporaneamente SSI e servizio sottostante a seconda del grado di controllo esercitato sulla specifica prestazione.",
   ],
   caso:[
    "Uber Spain (CGUE C-434/15, 2017): qualificato come servizio di trasporto → normativa comunale sui taxi applicabile → obbligo di licenza.",
    "Airbnb Ireland (CGUE C-390/18, 2019): qualificato come SSI → non soggetto alla normativa alberghiera → nessun obbligo di licenza alberghiera.",
    "Il criterio: Uber fissa le tariffe e controlla i driver (influenza decisiva); Airbnb non fissa i prezzi né costituisce il canale esclusivo per affittare.",
   ]},
  {n:29, t:"Click wrap / Browse wrap — clausole vessatorie — point and click",
   def:[
    "Click wrap: casella di spunta esplicita per accettare i termini d'uso — forma più garantista di accettazione nei contratti digitali.",
    "Browse wrap: accettazione implicita per semplice scorrimento o uso del sito — la forma più debole, spesso contestata in giudizio.",
    "Clausola vessatoria (art. 1341 c.c.): determina un significativo squilibrio a carico del consumatore → richiede doppia sottoscrizione specifica per essere valida.",
   ],
   arg:[
    "Il 'point and click' è inidoneo a soddisfare il requisito della doppia sottoscrizione: non garantisce l'identificazione certa di chi ha cliccato.",
    "L'unico strumento giuridicamente equiparabile alla firma analogica sarebbe la firma digitale qualificata — ma la sua imposizione sistematica paralizzerebbe l'e-commerce.",
    "Le clausole approvate con solo click — specie quelle che escludono la responsabilità o impongono fori competenti lontani — rischiano la nullità in sede giudiziale.",
   ],
   caso:[
    "Tribunale di Catanzaro (2012): eBay chiude l'account invocando una clausola di recesso unilaterale approvata con solo click.",
    "Il Tribunale dichiara nulla la clausola: è una clausola vessatoria priva di valida doppia sottoscrizione — il semplice click non è sufficiente.",
    "La conseguenza pratica: le clausole dei ToS che prevedono recesso unilaterale della piattaforma rischiano di essere nulle senza specifica approvazione scritta.",
   ]},
  {n:30, t:"Diritto di recesso ad nutum nei contratti digitali — PE Digital",
   def:[
    "Il recesso ad nutum (artt. 52 ss. Codice del Consumo) è il diritto irrinunciabile del consumatore di sciogliere un contratto B2C a distanza entro 14 giorni, senza motivazione e senza penali.",
    "Si applica sia ai contratti a titolo oneroso sia ai contratti in cui la controprestazione è costituita da dati personali.",
    "Se il professionista omette di informare sull'esistenza del diritto di recesso, il termine si estende automaticamente a 12 mesi.",
   ],
   arg:[
    "La ratio: compensare l'asimmetria informativa nella contrattazione 'al buio' online — il consumatore non può valutare il prodotto prima dell'acquisto.",
    "In caso di servizio 'parzialmente goduto': il professionista può trattenere solo la somma proporzionale al servizio effettivamente fruito — mai una penale forfettaria.",
    "La proporzionalità stretta: il rimborso si calcola in rigida proporzione matematica al prezzo originale del contratto, non sulla base di valutazioni discrezionali.",
   ],
   caso:[
    "PE Digital (CGUE C-641/19): un utente recede pochi giorni dopo essersi abbonato a un sito di incontri online, dopo aver già effettuato un test della personalità.",
    "Il sito pretendeva di trattenere quasi l'intera somma a titolo di 'compensazione' per il servizio parzialmente goduto.",
    "La CGUE vieta le penali forfettarie sproporzionate: il professionista può trattenere solo la somma calcolata in rigida proporzione al servizio parzialmente goduto.",
   ]},
  {n:31, t:"Il prosumer — professionista vs consumatore — Caso Kamenova",
   def:[
    "Il prosumer (producer + consumer): figura ibrida dell'economia di piattaforma che fonde produttore e consumatore — es. chi affitta su Airbnb o vende su eBay.",
    "La distinzione è fondamentale: il consumatore gode delle tutele del Codice del Consumo; il professionista è soggetto solo al Codice Civile.",
    "Criteri della Commissione UE: frequenza (non occasionale), volume d'affari (fatturato elevato), finalità di lucro (remunerazione che supera il rimborso costi).",
   ],
   arg:[
    "La classificazione non dipende dalla struttura formale aziendale ma dalla sistematicità e dal fine di lucro dell'attività concretamente svolta.",
    "Il rischio per la piattaforma: se l'utente viene classificato come professionista, l'acquirente gode di tutte le tutele del Codice del Consumo nei confronti della piattaforma.",
    "Il prosumer in zona grigia: pubblica molti annunci ma non ha partita IVA — il giudice valuta caso per caso la realtà economica dell'attività.",
   ],
   caso:[
    "Kamenova (CGUE C-105/17, 2018): una persona fisica pubblica 8 annunci di vendita di orologi usati su un sito web.",
    "La CGUE stabilisce: il numero di annunci non determina automaticamente lo status professionale.",
    "Occorre valutare concretamente: la sistematicità delle vendite, l'eventuale organizzazione strutturata, la presenza di un fine di lucro sistematico — non parametri formali.",
   ]},
  {n:32, t:"Disattivazione dell'account — risoluzione o recesso — Messina vs Catanzaro",
   def:[
    "La disattivazione dell'account può configurarsi come risoluzione per inadempimento (art. 1456 c.c.) se vi è una grave violazione delle regole della piattaforma.",
    "Oppure come recesso unilaterale (art. 1373 c.c.) — che, in quanto clausola vessatoria, richiede la specifica doppia approvazione scritta per essere valido.",
    "Il DSA (art. 7) introduce l'obbligo generale di motivazione per ogni restrizione all'account: fine dell'arbitrio unilaterale delle piattaforme.",
   ],
   arg:[
    "La clausola di recesso unilaterale inserita nei ToS e approvata con click è una clausola vessatoria: potenzialmente nulla senza doppia sottoscrizione.",
    "Se la chiusura è immotivata o per un inadempimento irrilevante, la piattaforma commette un recesso abusivo — risarcimento del danno.",
    "Il DSA garantisce all'utente il diritto di accedere a un sistema interno di reclamo della piattaforma: procedura obbligatoria prima di adire il giudice.",
   ],
   caso:[
    "Tribunale di Messina (2010): eBay chiude l'account per un modesto calo dei feedback → il Tribunale qualifica come 'risoluzione per inadempimento' ma la ritiene infondata.",
    "Tribunale di Catanzaro (2012): stesso fatto, qualificato come 'recesso unilaterale abusivo' — la clausola risolutiva è nulla per mancanza di doppia sottoscrizione.",
    "I due tribunali divergono sulla qualificazione ma convergono sul risultato: la chiusura arbitraria dell'account è giuridicamente contestabile.",
   ]},
  {n:33, t:"Gratuità e onerosità dei contratti digitali — dati come controprestazione — AGCM vs Facebook",
   def:[
    "Modello proprietario: i dati personali sono beni commerciabili, il loro conferimento configura una vera 'controprestazione' negoziale.",
    "Modello personalistico (EDPB): i dati sono attributi fondamentali della personalità — il consenso è solo un'autorizzazione revocabile, non una prestazione economica.",
    "Le nuove direttive UE estendono esplicitamente il Codice del Consumo ai contratti in cui la controprestazione è costituita da dati: il servizio non è 'gratuito'.",
   ],
   arg:[
    "Un servizio ceduto in cambio di dati non è gratuito: l'utente paga con informazioni che hanno un preciso valore commerciale.",
    "Lo sfruttamento massivo dei dati per finalità di publicità mirata trasforma il rapporto in un contratto oneroso, con tutte le conseguenti tutele consumeristiche.",
    "Il corollario: il professionista che offre un servizio 'gratuito' in cambio di dati deve informare il consumatore del valore economico dello scambio.",
   ],
   caso:[
    "AGCM v. Facebook (2018): l'Antitrust italiana sanziona Facebook per pratica commerciale scorretta.",
    "Lo slogan 'È gratis e lo sarà sempre' è giudicato ingannevole: i dati utenti costituiscono un corrispettivo economico reale.",
    "L'AGCM stabilisce che Facebook stava conducendo un'attività economica lucrativa basata sullo sfruttamento dei dati — il servizio non era gratuito.",
   ]},
  {n:34, t:"Regolamento P2B — clausole abusive B2B — Data Act",
   def:[
    "Il Regolamento P2B (Reg. UE 2019/1150): riequilibra le asimmetrie tra piattaforme e PMI imponendo obblighi di trasparenza e correttezza.",
    "Obblighi P2B: pubblicazione e spiegazione dei parametri del ranking, preavviso di 15 giorni per modifiche contrattuali, 30 giorni per chiusura account con motivazione.",
    "Il Data Act (Reg. UE 2023/2854) introduce per la prima volta nel diritto UE il concetto di clausola abusiva nel rapporto B2B digitale.",
   ],
   arg:[
    "Le PMI accettano i ToS delle piattaforme in logica 'prendere o lasciare': il P2B riconosce questa asimmetria strutturale e la corregge con obblighi perentori.",
    "Il ranking trasparente è essenziale: senza conoscerne i parametri, la PMI non può ottimizzare la propria visibilità e compete 'alla cieca'.",
    "Il Data Act presume non vincolanti le clausole che consentono alla piattaforma di accedere ai dati aziendali della PMI per farle concorrenza.",
   ],
   caso:[
    "Amazon Marketplace: i parametri del ranking erano segreti — il P2B ora impone la loro pubblicazione e comprensibilità per i venditori terzi.",
    "Apple App Store come Gatekeeper DMA: commissioni unilaterali e regole opache — campo di applicazione privilegiato delle nuove norme sulla trasparenza B2B.",
    "Data Act: la clausola che esclude la responsabilità della piattaforma per inadempimento grave verso la PMI è presuntivamente nulla come clausola abusiva.",
   ]},
  {n:35, t:"Difetto di conformità materiale e giuridica — beni smart — Direttiva 2019/771",
   def:[
    "La Direttiva 2019/771 (d.lgs. 170/2021) regola i 'beni con elementi digitali': beni mobili che incorporano un software senza il quale non potrebbero svolgere le loro funzioni.",
    "Difetto di conformità materiale: include l'obsolescenza programmata — il venditore ha l'obbligo di fornire gli aggiornamenti necessari per tutta la vita utile ragionevolmente attesa.",
    "Difetto di conformità giuridica: il software incorporato nel bene viola norme UE imperative (es. GDPR) — il bene è difettoso anche se funziona perfettamente.",
   ],
   arg:[
    "L'obbligo di aggiornamento è continuativo: se il venditore cessa di rilasciare aggiornamenti di sicurezza prima del termine, il bene diventa legalmente difettoso.",
    "La conformità giuridica allinea la vita digitale del prodotto alla sua vita fisica: non basta che il hardware funzioni se il software viola i diritti degli utenti.",
    "I rimedi: ripristino della conformità, riduzione del prezzo, risoluzione del contratto — gli stessi rimedi del difetto materiale.",
   ],
   caso:[
    "Smartwatch con app che raccoglie illecitamente dati sanitari in violazione del GDPR: bene affetto da difetto di conformità giuridica.",
    "Il consumatore può richiedere il ripristino della conformità (aggiornamento del software), la riduzione del prezzo o la risoluzione del contratto.",
    "Il caso dimostra come la Direttiva abbia esteso la tutela consumeristica dai difetti fisici ai difetti digitali, incluse le violazioni normative.",
   ]},
  {n:36, t:"Natura giuridica degli Smart Contract — tesi contrattualista vs non contrattualista",
   def:[
    "Gli Smart Contract sono accordi tradotti in codice informatico e registrati su blockchain, che si eseguono automaticamente al verificarsi di condizioni oggettive predeterminate.",
    "Tesi non contrattualista: si tratta di procedure computazionali automatizzate prive di testo linguistico — impossibile rilevare patologie del consenso (errore, dolo, violenza).",
    "Tesi contrattualista (prevalente): il consenso si forma 'a monte', nella programmazione e nell'accettazione dell'interfaccia — il codice regola solo l'adempimento.",
   ],
   arg:[
    "L'analogia della vending machine: chi acquista una bevanda da un distributore automatico non negozia verbalmente, ma il contratto si perfeziona lo stesso.",
    "Lo stesso vale per lo Smart Contract: accettando di interfacciarsi con il protocollo crittografico, si forma il consenso giuridico 'a monte'.",
    "L'automatismo del codice riguarda esclusivamente la fase di esecuzione, non quella di formazione del contratto — le patologie del consenso si valutano al momento dell'accettazione.",
   ],
   caso:[
    "La vending machine (distributore automatico) è l'analogia canonica: inserisci soldi, premi il tasto, ricevi il prodotto — contratto perfetto senza parole.",
    "Nello Smart Contract: l'utente che accetta il protocollo crittografico presta un consenso 'a monte' alla prestazione che sarà eseguita automaticamente.",
    "L'automatismo dell'adempimento (trasferimento di criptovaluta) è tecnicamente inarrestabile, ma non esclude la possibilità di contestare il contratto per vizi del consenso formatosi a monte.",
   ]},
  {n:37, t:"Bitcoin come moneta — classificazione BCE — diritto di credito",
   def:[
    "Le tre funzioni classiche della moneta: mezzo di scambio (accettata per beni), misura di valori (esprime relazioni di cambio), riserva di liquidità (strumento di capitalizzazione).",
    "La BCE (2015) e il d.lgs. 90/2017 escludono che il Bitcoin possa essere inteso come moneta: è qualificato come 'rappresentazione digitale di valore'.",
    "Il Bitcoin non è emesso da una Banca Centrale statale e il suo valore non è garantito da riserve: fluttua esclusivamente in base al mining e alla speculazione.",
   ],
   arg:[
    "Il Bitcoin non è moneta a corso legale: nessun soggetto è obbligato ad accettarlo in pagamento — l'accettazione è solo volontaria.",
    "Tesi alternativa: il Bitcoin come 'diritto di credito' — il possessore è creditore del protocollo di rete, non proprietario di un bene materiale.",
    "La classificazione BCE in tre categorie: utility token (accesso a servizio), investment token (assimilabile a strumento finanziario), exchange/payment token (come il Bitcoin).",
   ],
   caso:[
    "BCE e d.lgs. 90/2017: il Bitcoin è una 'rappresentazione digitale di valore' — non moneta, ma non priva di rilevanza giuridica.",
    "La classificazione BCE fornisce il quadro: utility token, investment token, exchange token (o payment token) — ciascuno con disciplina diversa.",
    "La tesi del 'servizio telematico': chi possiede Bitcoin è titolare di un diritto di credito verso i nodi della rete che gestiscono il deposito e le transazioni.",
   ]},
  {n:38, t:"Prezzi personalizzati/dinamici — Direttiva Omnibus",
   def:[
    "I prezzi personalizzati: la piattaforma usa machine learning e Big Data per profilare ogni singolo utente ed estrarne il 'prezzo di riserva' — la somma massima che è disposto a pagare.",
    "I prezzi dinamici: variano in base alla domanda aggregata in tempo reale (es. surge pricing Uber) — non dipendono dal profilo individuale dell'utente.",
    "La Direttiva Omnibus (2019/2161): obbligo di informare il consumatore ogni volta che il prezzo mostrato è stato personalizzato su base algoritmica.",
   ],
   arg:[
    "La personalizzazione algoritmica genera asimmetria informativa letale: l'utente non sa che il prezzo è stato ricalcolato appositamente contro di lui.",
    "L'utente perde ogni possibilità di comparazione oggettiva: la cifra mostrata a schermo è stata gonfiata appositamente per quel profilo specifico.",
    "L'omissione dell'informazione invalida la correttezza del consenso: è pratica commerciale ingannevole ex Direttiva Omnibus.",
   ],
   caso:[
    "Amazon varia i prezzi milioni di volte al giorno per categoria e profilo utente — il prezzo che vedi dipende da chi sei e da cosa hai cercato in precedenza.",
    "Uber surge pricing: prezzi dinamici comunicati esplicitamente — legittimi perché trasparenti, a differenza dei prezzi personalizzati nascosti.",
    "La Direttiva Omnibus mira specificamente ai prezzi personalizzati nascosti: obbliga a comunicare 'questo prezzo è stato personalizzato per te su base algoritmica'.",
   ]},
  {n:39, t:"Sharing Economy — condivisione beni materiali — proprietà",
   def:[
    "La Sharing Economy è l'ecosistema economico in cui la circolazione dei beni avviene attraverso la condivisione e l'accesso temporaneo, non solo il trasferimento della proprietà.",
    "Condizioni economiche per la sharing economy: il bene deve essere 'diffuso' (facilmente reperibile a prezzo accessibile) e deve avere 'capacità in eccesso'.",
    "La Sharing Economy non segna la fine della proprietà privata: al contrario, la presuppone strutturalmente.",
   ],
   arg:[
    "Senza proprietà privata del veicolo o dell'immobile, BlaBlaCar o Airbnb non esisterebbero: il proprietario cede l'uso temporaneo, non il diritto dominicale.",
    "Il 'detentore qualificato': chi accede al servizio acquisisce un diritto di godimento limitato nel tempo su funzionalità specifiche — non la proprietà.",
    "La piattaforma gestisce l'incontro tra chi ha capacità in eccesso e chi ne ha bisogno: abbatte i costi di transazione rendendo economicamente sostenibile la condivisione.",
   ],
   caso:[
    "BlaBlaCar: il proprietario privato del veicolo condivide il tragitto cedendo temporaneamente la capacità in eccesso dei posti auto.",
    "Airbnb: il proprietario dell'immobile affitta temporaneamente lo spazio non utilizzato — condivisione della capacità in eccesso dell'abitazione.",
    "Uber: il caso più complesso — la piattaforma esercita influenza decisiva sulla prestazione, rendendo problematica la classificazione come mera condivisione.",
   ]},
 ]},
 {c:5, title:"La Proprietà nei Mercati Digitali", qs:[
  {n:40, t:"Beni rivali/non rivali — escludibili — tragedia dei beni comuni",
   def:[
    "Bene rivale: il consumo da parte di uno riduce la disponibilità per altri (es. una mela, un posto a sedere). Non rivale: il consumo non riduce la disponibilità (es. un'idea, un file musicale).",
    "Bene escludibile: è possibile impedire fisicamente o tecnicamente l'uso a chi non paga. Non escludibile: è impossibile impedirlo tecnicamente.",
    "I beni immateriali della conoscenza nascono naturalmente come beni non rivali: milioni possono usarli simultaneamente senza consumarli.",
   ],
   arg:[
    "La proprietà intellettuale crea escludibilità artificiale su beni intrinsecamente non rivali: incentivo alla creazione vs. accesso libero alla conoscenza — tensione strutturale.",
    "La tragedia dei beni comuni (Hardin, 1967): i beni rivali non escludibili vengono sovra-sfruttati fino alla distruzione (il pascolo comune).",
    "I beni immateriali sono immuni alla tragedia dei beni comuni: essendo non rivali, l'accesso di milioni non li consuma né li distrugge.",
   ],
   caso:[
    "Garrett Hardin (1967): ogni pastore aggiunge pecore al pascolo comune fino a distruggerlo — la logica del free rider distrugge il bene collettivo.",
    "Wikipedia: immune alla tragedia perché non rivale — miliardi di accessi non consumano né deteriorano l'enciclopedia, al contrario la migliorano.",
    "Il paradosso della PI: l'escludibilità artificiale crea incentivi alla creazione ma frena la diffusione di beni che sarebbero naturalmente abbondanti.",
   ]},
  {n:41, t:"Dal Copyright al Copyleft — GPL — Creative Commons",
   def:[
    "Il copyright conferisce un'esclusiva proprietaria: riproduzione, modifica e distribuzione vietate senza autorizzazione.",
    "Il copyleft usa il diritto d'autore al contrario: il creatore sfrutta le norme sul copyright per garantire — anziché limitare — libertà d'uso, modifica e ridistribuzione.",
    "La GPL (Stallman): clausola 'virale' — chi modifica il codice deve rilasciare le migliorie con la stessa licenza, impedendo la privatizzazione dei miglioramenti.",
   ],
   arg:[
    "La clausola virale della GPL impedisce la privatizzazione delle migliorie: il codice migliorato deve rimanere libero.",
    "Le licenze Creative Commons (Lessig) estendono la logica del copyleft alle opere creative: moduli combinabili BY (attribuzione), SA (share alike), NC (non commercial), ND (no derivative).",
    "Le CC incorporano un 'digital code': metadati leggibili dai motori di ricerca inglobati nel file, che viaggiano con l'opera ovunque essa vada.",
   ],
   caso:[
    "Linux: sistema operativo GPL costruito interamente dalla community — oggi il principale sistema operativo usato a livello server globale.",
    "Wikipedia: licenza CC BY-SA — chiunque riusi i contenuti deve attribuire la fonte e condividere le modifiche con la stessa licenza.",
    "Entrambi i casi dimostrano che il copyleft non è un ostacolo all'innovazione ma uno strumento per garantire che l'innovazione rimanga accessibile a tutti.",
   ]},
  {n:42, t:"Lo statuto del file digitale — licenza d'uso — Caso 1984 Amazon",
   def:[
    "Acquistare un file digitale non trasferisce la proprietà: si ottiene solo una licenza d'uso, cioè il diritto di usarlo secondo i termini stabiliti unilateralmente dal licenziante.",
    "I poteri dominicali compressi: il titolare del file non può cederlo, sublicenziarlo, rivenderlo né prestarlo — è un 'detentore qualificato', non un proprietario.",
    "I ToS + DRM combinati eliminano tutti i diritti tipici della proprietà: ius excludendi, fruendi e disponendi vengono sistematicamente svuotati.",
   ],
   arg:[
    "Il fornitore mantiene controllo assoluto sull'uso post-vendita: può modificare unilateralmente i termini, sospendere il servizio o cancellare l'accesso.",
    "La piattaforma cloud si riserva il diritto di analizzare automaticamente i file archiviati: chi usa il cloud non può escludere il fornitore dal proprio 'spazio'.",
    "La compressione dei diritti è strutturale: il modello economico della piattaforma dipende dal mantenimento del controllo post-vendita.",
   ],
   caso:[
    "Amazon Kindle (2009): Amazon cancella da remoto il romanzo '1984' di George Orwell dalle librerie virtuali di ignari acquirenti.",
    "Acertato un problema di diritti d'autore, Amazon agisce unilateralmente: gli utenti si svegliano con il libro scomparso dal loro dispositivo.",
    "La class action che ne seguì ha dimostrato plasticamente che acquistare un e-book equivale a licenziarsi un accesso revocabile, non a possedere il libro.",
   ]},
  {n:43, t:"Esaurimento del diritto di distribuzione — UsedSoft / Tom Kabinet",
   def:[
    "Principio di esaurimento: dopo la prima vendita autorizzata il titolare del copyright perde il controllo sulla successiva circolazione di quell'esemplare.",
    "La questione centrale: il principio si applica ai file digitali trasmessi online?",
    "Il discrimine CGUE: 'distribuzione' (si esaurisce) vs. 'comunicazione al pubblico' (non si esaurisce e richiede sempre l'autorizzazione).",
   ],
   arg:[
    "La ratio economica: un file digitale è un sostituto perfetto della copia nuova — autorizzare la rivendita distruggerebbe il mercato primario dell'editore.",
    "Per il software: la permanenza della licenza e il pagamento unico (una tantum) lo equipara economicamente alla compravendita materiale → esaurimento applicabile.",
    "Per gli e-book: la trasmissione online è 'comunicazione al pubblico', non distribuzione → il diritto non si esaurisce → no mercato dell'usato digitale.",
   ],
   caso:[
    "UsedSoft (CGUE C-128/11, 2012): il download permanente di un programma con licenza una tantum equivale a una compravendita → diritto di distribuzione esaurito → software usato rivendibile.",
    "Tom Kabinet (CGUE C-263/18, 2019): la trasmissione di e-book è 'comunicazione al pubblico', non 'distribuzione' → diritto non si esaurisce → e-book usati non rivendibili.",
    "La distinzione: software (utilità funzionale permanente, sostituto perfetto) vs. e-book (opera creativa, ogni trasmissione è una nuova comunicazione al pubblico).",
   ]},
  {n:44, t:"NFT — infungibilità — scarcità artificiale",
   def:[
    "NFT (Non-Fungible Token): asset digitale univoco e non replicabile, registrato su blockchain tramite Smart Contract.",
    "Infungibile: ciascun NFT è identificato da un codice unico che lo differenzia da ogni altro token — non intercambiabile come le banconote.",
    "Scarcità artificiale: l'NFT reintroduce il concetto fisico della scarcità in un ambiente digitale strutturalmente caratterizzato dall'abbondanza.",
   ],
   arg:[
    "Chiunque può copiare e scaricare il file jpeg: l'NFT certifica solo la 'titolarità' di quella specifica istanza — non conferisce esclusiva d'uso.",
    "Token nativo: opera digitale originale creata appositamente come NFT — potenzialmente tutelabile anche da diritto d'autore.",
    "Token non nativo: tokenizzazione di opera fisica preesistente — si trasferisce il token, non i diritti sull'opera originale.",
   ],
   caso:[
    "'Everydays: The First 5000 Days' di Beeple: venduto da Christie's per 69 milioni di dollari — il più costoso NFT della storia.",
    "Chi acquista l'NFT ottiene un certificato digitale di titolarità su blockchain, non l'opera in sé.",
    "Beeple ha conservato il copyright: può ancora riprodurre, vendere e sfruttare commercialmente l'opera — l'acquirente dell'NFT non ha acquisito diritti di esclusiva.",
   ]},
  {n:45, t:"L'eredità digitale — account — Yahoo! / Facebook BGH",
   def:[
    "L'eredità digitale: le sorti dei beni informatici immateriali (account social, caselle email, file cloud, criptovalute) alla morte del titolare.",
    "Il principio civile: l'erede subentra nei rapporti contrattuali di natura patrimoniale — ma i ToS delle piattaforme USA inseriscono clausole di intrasmissibilità e cancellazione automatica.",
    "Il conflitto: diritto degli eredi a subentrare patrimonialmente vs. diritto alla riservatezza dei terzi che hanno comunicato con il defunto.",
   ],
   arg:[
    "L'account social non ha carattere personalissimo come il diritto al voto: contiene beni patrimoniali (foto, ricordi) trasmissibili agli eredi.",
    "La chiave del BGH tedesco: l'account è equiparato a un 'diario personale' — rapporto contrattuale trasmissibile perché non personalissimo.",
    "I ToS americani di intrasmissibilità non possono prevalere sul diritto successorio europeo: la questione si gioca sul conflitto tra legge del contratto e legge successoria.",
   ],
   caso:[
    "Caso Yahoo! (USA, 2004): accesso negato alla famiglia del marine ucciso in Iraq — i ToS prevedevano la cancellazione dell'account alla morte.",
    "BGH Germania (2018): i genitori ottengono accesso all'account Facebook della figlia deceduta in metropolitana.",
    "Il BGH equipara l'account a un diario personale: il rapporto contrattuale con Facebook è trasmissibile agli eredi, al pari di una cassetta di sicurezza fisica.",
   ]},
  {n:46, t:"Successione negli asset digitali — art. 2-terdecies d.lgs. 101/2018 — Apple iCloud",
   def:[
    "L'art. 2-terdecies del d.lgs. 101/2018 (adeguamento italiano al GDPR): i diritti relativi ai dati personali di un defunto possono essere esercitati da chi ha un interesse proprio o ragioni familiari meritevoli di protezione.",
    "Il fondamento non è il diritto successorio classico ma il diritto alla protezione dei dati: chi agisce non subentra nel contratto ma esercita autonomi diritti sui dati.",
    "Limite: l'accesso è precluso solo se il defunto aveva espresso in vita un divieto formale, specifico e scritto alla trasmissione.",
   ],
   arg:[
    "Le clausole dei ToS accettate genericamente con click non costituiscono un valido 'divieto preventivo': serviva una richiesta specifica e inequivocabile della piattaforma.",
    "Le 'ragioni familiari meritevoli di protezione' sono una categoria giuridica aperta: recuperare la memoria digitale del familiare vi rientra pienamente.",
    "L'art. 2-terdecies bypassa le clausole americane di intrasmissibilità: il diritto italiano consente l'accesso ai dati anche contro la volontà della piattaforma.",
   ],
   caso:[
    "Casi Apple iCloud (2021-2022): Tribunali di Milano, Bologna e Roma intimano ad Apple di consentire l'accesso ai genitori di figli deceduti.",
    "Apple rifiutava citando le policy statunitensi: i giudici italiani ordinano l'accesso applicando l'art. 2-terdecies.",
    "Il recupero della memoria familiare (foto, video, messaggi) rientra tra le 'ragioni familiari meritevoli di protezione' contro cui ogni clausola contrattuale deve retrocedere.",
   ]},
 ]},
 {c:6, title:"Responsabilità del Provider e Intelligenza Artificiale", qs:[
  {n:47, t:"Il regime speciale del DSA — responsabilità intermediari — esonero hosting",
   def:[
    "Il DSA (Reg. UE 2022/2065) aggiorna la Direttiva 2000/31/CE e prevede un regime speciale di esonero dalla responsabilità civile, penale e amministrativa per i provider di servizi intermediari.",
    "Tre categorie: access provider (art. 4, mere conduit), cache provider (art. 5, caching) e host provider (art. 6, hosting) — con condizioni di esonero crescentemente stringenti.",
    "Il principio unificante: il provider beneficia dell'esonero solo se il suo intervento è puramente automatico, passivo e neutro — privo di qualsiasi controllo editoriale.",
   ],
   arg:[
    "L'host provider (art. 6): le condizioni di esonero sono alternative — o non è effettivamente a conoscenza dell'illiceità, oppure agisce immediatamente per rimuovere il contenuto.",
    "La 'clausola del buon samaritano' (art. 7 DSA): i controlli volontari pro-attivi del provider non gli fanno perdere la qualifica di fornitore neutro.",
    "Il DSA uniforma a livello europeo la frammentazione normativa nazionale creatasi dai diversi recepimenti della Direttiva 2000/31/CE.",
   ],
   caso:[
    "Glawischnig-Piesczek v. Facebook (CGUE C-18/18, 2019): il giudice può ordinare la rimozione di contenuti 'identici o equivalenti' a un contenuto diffamatorio già individuato.",
    "La condizione: l'equivalenza deve essere rilevabile tramite strumenti automatizzati senza imporre alla piattaforma un'autonoma valutazione giuridica.",
    "Il caso segna il limite: la piattaforma può essere obbligata a rimuovere il 'clone' del contenuto illecito, ma non a svolgere sorveglianza generalizzata e preventiva.",
   ]},
  {n:48, t:"Assenza del dovere generale di sorveglianza — SABAM / Telekabel / Glawischnig",
   def:[
    "Art. 8 DSA: i prestatori di servizi intermediari non sono soggetti a un obbligo generale di monitoraggio delle informazioni che trasmettono o memorizzano.",
    "Sono ammessi solo doveri di controllo specifici e mirati, imposti dall'autorità giudiziaria su contenuti già individuati come illeciti.",
    "Un obbligo generale di filtraggio massiccio violerebbe la libertà d'impresa del provider e comprimerebbe sproporzionatamente riservatezza e libertà di espressione degli utenti.",
   ],
   arg:[
    "Il bilanciamento CGUE: tra tutela della proprietà intellettuale e libertà di espressione, né l'una né l'altra può prevalere in modo assoluto — serve proporzionalità.",
    "La clausola del buon samaritano (art. 7 DSA): i controlli volontari pro-attivi per rimuovere illeciti non fanno perdere l'esonero — incentivo a comportamenti virtuosi.",
    "La 'conoscenza effettiva' dell'illecito — non la mera possibilità tecnica di scoprirlo — è la soglia che fa scattare l'obbligo di rimozione per l'host provider.",
   ],
   caso:[
    "SABAM v. Netlog (CGUE C-360/10): no filtro preventivo generale per i social network — la CGUE esclude l'obbligo di sorveglianza attiva.",
    "UPC Telekabel Wien (CGUE C-314/12): un ISP può essere destinatario di ordini di blocco specifici, ma non può essere costretto a installare filtri generali su tutto il traffico.",
    "Glawischnig-Piesczek v. Facebook (CGUE C-18/18): ammessa la rimozione di contenuti 'identici o equivalenti' senza valutazione giuridica autonoma della piattaforma.",
   ]},
  {n:49, t:"Fornitura neutra vs hosting attivo — Louis Vuitton v. Google / L'Oréal v. eBay",
   def:[
    "Hosting neutro (o passivo): il provider opera in modo automatico, tecnico e privo di qualsiasi conoscenza o controllo sui contenuti — beneficia dell'esonero DSA.",
    "Hosting attivo: la piattaforma svolge attività di selezione, organizzazione o promozione dei contenuti per trarne un vantaggio commerciale — perde l'esonero e diventa corresponsabile.",
    "Il Considerando 22 DSA: il semplice impiego di funzioni di ricerca o indicizzazione automatizzata non basta di per sé a far perdere la neutralità.",
   ],
   arg:[
    "Il test concreto: il provider ha esercitato un controllo editoriale o un'ingerenza consapevole sui contenuti per ricavarne un vantaggio commerciale?",
    "La 'clausola del buon samaritano' (art. 7 DSA): i controlli volontari proattivi per rimuovere illeciti non fanno perdere l'esonero — anzi sono incentivati.",
    "L'hosting attivo rompe la neutralità: la piattaforma non è più un mero condotto tecnico ma un editore che seleziona e promuove i contenuti — stesso regime di responsabilità.",
   ],
   caso:[
    "Louis Vuitton v. Google (CGUE C-236/08, 2010): AdWords memorizza le parole chiave in modo automatico senza controllo editoriale → hosting neutro → esonero confermato.",
    "L'Oréal v. eBay (CGUE C-324/09, 2011): eBay promuoveva attivamente gli annunci, ottimizzando la presentazione per trarne vantaggio commerciale → hosting attivo → perde l'esonero.",
    "Il contrasto tra i due casi fissa il discrimine: automatismo tecnico (Google) vs. ingerenza commerciale consapevole (eBay) = neutro vs. attivo.",
   ]},
  {n:50, t:"DSA — Notice and Take Down — VLOPs — rischi sistemici",
   def:[
    "Segnalazione qualificata (art. 9 DSA): proveniente da autorità giudiziaria o amministrativa competente — crea immediatamente l'obbligo di rimozione e l'esonero dalla responsabilità.",
    "Segnalazione semplice (art. 16 DSA): inoltrata da qualsiasi utente — genera la 'conoscenza effettiva' dell'illecito, obbligando l'host provider ad agire tempestivamente.",
    "VLOPs (Very Large Online Platforms): piattaforme con oltre 45 milioni di utenti attivi mensili nell'UE — soggette a obblighi aggiuntivi di risk management annuale.",
   ],
   arg:[
    "Il DSA uniforma le procedure di rimozione a livello europeo: fine della frammentazione normativa creata dai diversi recepimenti nazionali della Direttiva 2000/31/CE.",
    "I rischi sistemici delle VLOPs: diffusione virale di contenuti illegali, pregiudizi ai processi elettorali e democratici, danni alla salute mentale dei minori.",
    "Il notice and stay-down: una volta rimosso su segnalazione, il provider deve impedire il ricaricamento futuro — obbligo di sorveglianza specifico e mirato.",
   ],
   caso:[
    "Il regime notice and stay-down (Direttiva Copyright art. 17): rimozione + impedimento del ricaricamento — obbligo specifico e mirato, non sorveglianza generalizzata.",
    "VLOPs: obbligati a valutare annualmente i rischi sistemici dei loro algoritmi e ad adottare misure di mitigazione proporzionate.",
    "Accessibilità dei dati: le VLOPs devono consentire l'accesso ai propri dati a ricercatori accreditati per la valutazione indipendente dei rischi sistemici.",
   ]},
  {n:51, t:"Direttiva Copyright 2019/790 — diritti ancillari art. 15 — art. 17",
   def:[
    "Art. 15 Direttiva 2019/790: introduce i 'diritti ancillari' degli editori di stampa — gli aggregatori di notizie non possono riprodurre estratti (snippet) senza licenza.",
    "Art. 17: le piattaforme di condivisione di contenuti compiono 'comunicazione al pubblico' quando memorizzano contenuti protetti caricati dagli utenti.",
    "L'art. 17 ribalta l'onere probatorio: la piattaforma risponde direttamente per violazione del copyright, salvo dimostri di aver compiuto i 'massimi sforzi'.",
   ],
   arg:[
    "I tre requisiti cumulativi dell'art. 17: aver tentato la licenza + aver compiuto massimi sforzi per impedire il caricamento + aver rimosso tempestivamente i contenuti segnalati.",
    "L'art. 15 tutela l'investimento editoriale: i giornali non finanziano il giornalismo per arricchire gratuitamente Google News.",
    "Il regime delle 'comunicazione al pubblico' trasforma le piattaforme di condivisione da hosting passive a editori corresponsabili.",
   ],
   caso:[
    "YouTube investe miliardi nel sistema Content ID: strumento di 'massimi sforzi' per il filtraggio preventivo dei contenuti protetti caricati dagli utenti.",
    "Google News negozia accordi commerciali con gli editori europei per rispettare l'art. 15 — o rischia sanzioni per ogni snippet riprodotto senza licenza.",
    "La Direttiva ha trasformato le piattaforme: non più semplici fornitori di hosting neutro, ma soggetti che compiono 'comunicazione al pubblico' e rispondono come tali.",
   ]},
  {n:52, t:"'Massimi sforzi' art. 17 — filtraggio preventivo — Caso Polonia (C-401/19)",
   def:[
    "I 'massimi sforzi' dell'art. 17 impongono di fatto l'adozione di sistemi di filtraggio algoritmico preventivo sul caricamento dei contenuti.",
    "Il rischio strutturale: gli algoritmi non distinguono la violazione illecita dall'uso lecito (parodia, critica, citazione, didattica) — censura automatizzata di contenuti legittimi.",
    "La CGUE richiede come contrappeso: procedure di reclamo interne gestite da esseri umani, rapide ed efficaci, per il ripristino dei contenuti rimossi ingiustificatamente.",
   ],
   arg:[
    "Il filtraggio preventivo generalizzato configura una sorveglianza attiva: in tensione con il divieto di obblighi generali di monitoraggio (art. 8 DSA).",
    "Il bilanciamento proporzionato: tutela della proprietà intellettuale vs. libertà di espressione (art. 11 Carta UE) — nessuna può prevalere in modo assoluto.",
    "Le procedure di reclamo umane sono la condizione di legittimità costituzionale del sistema: senza di esse, il filtraggio sarebbe censura incostituzionale.",
   ],
   caso:[
    "Polonia v. Parlamento e Consiglio (CGUE C-401/19, 2022): la Polonia impugna l'art. 17 per violazione della libertà di espressione.",
    "La CGUE respinge il ricorso: gli obblighi sono compatibili con la Carta a condizione che le piattaforme garantiscano procedure di reclamo umane efficaci.",
    "Il Caso Polonia fissa il compromesso costituzionale: filtraggio preventivo ammesso + reclamo umano obbligatorio = equilibrio tra PI e libertà di espressione.",
   ]},
  {n:53, t:"Responsabilità art. 2049 c.c. — danni offline dei collaboratori della piattaforma",
   def:[
    "Art. 2049 c.c.: responsabilità solidale dei 'padroni e committenti' per i danni causati dai loro preposti — indipendentemente dalla qualificazione formale del contratto.",
    "Il 'rapporto di preposizione' in senso materiale: effettivo potere di direzione e controllo sull'esecutore della prestazione — la forma contrattuale è irrilevante.",
    "Se la piattaforma fissa le tariffe, assegna le corse, impone istruzioni vincolanti e irroga sanzioni disciplinari → esercita il potere di direzione che configura la preposizione.",
   ],
   arg:[
    "La forma contrattuale (autonomo vs. dipendente) non conta: conta la sostanza del rapporto e l'effettivo potere di controllo esercitato dalla piattaforma.",
    "Il corollario pratico: il danneggiato da un sinistro causato dal rider o dal driver può citare in giudizio la piattaforma come coobbligata solidale.",
    "Il criterio dell'influenza decisiva (elaborato per distinguere SSI da servizio sottostante) è anche il criterio che determina la responsabilità ex art. 2049 c.c.",
   ],
   caso:[
    "Uber Spain (CGUE C-434/15, 2017): Uber esercita influenza decisiva sui driver — assegna le corse, fissa le tariffe, controlla la condotta.",
    "Sinistro causato dal conducente Uber: il danneggiato può citare Uber come coobbligata solidale ex art. 2049 c.c. — responsabilità diretta della piattaforma.",
    "Airbnb Ireland: l'host mantiene piena autonomia organizzativa e tariffaria sul proprio immobile → no rapporto di preposizione → no responsabilità ex art. 2049 c.c.",
   ]},
  {n:54, t:"La Piramide del Rischio dell'AI Act — pratiche vietate (rischio inaccettabile)",
   def:[
    "L'AI Act struttura il proprio intervento normativo su una 'piramide del rischio' a quattro livelli: rischio inaccettabile (divieto assoluto), alto rischio, rischio specifico/limitato, rischio minimo/nullo.",
    "Al vertice: i sistemi di IA con 'rischio inaccettabile' — incompatibili con i diritti fondamentali e i principi democratici dell'UE — soggetti a divieto assoluto.",
    "Non possono essere immessi sul mercato, messi in servizio, né utilizzati all'interno dell'Unione: il divieto è categorico, senza eccezioni basate sul bilanciamento.",
   ],
   arg:[
    "Il catalogo tassativo dei divieti: tecniche subliminali per distorcere il comportamento, sfruttamento delle vulnerabilità legate all'età o a disabilità fisiche/mentali.",
    "Social scoring generalizzato da parte di soggetti pubblici: valutazione dei cittadini in base ai comportamenti sociali con conseguenze pregiudizievoli generalizzate.",
    "Identificazione biometrica remota in tempo reale in spazi pubblici: vietata con rarissime deroghe preventivamente autorizzate dalla magistratura.",
   ],
   caso:[
    "Il sistema di 'social scoring' cinese è il caso paradigmatico di pratica inaccettabile in Europa: valutazione del comportamento sociale dei cittadini con conseguenze pervasive.",
    "Clearview AI: scraping biometrico da internet per costruire banche dati di riconoscimento facciale — pratica vietata dall'AI Act.",
    "Riconoscimento facciale in spazi pubblici: solo se autorizzato preventivamente dalla magistratura per terrorismo, ricerca di vittime di sequestro o prevenzione di reati gravi.",
   ]},
  {n:55, t:"Sistemi AI ad alto rischio — requisiti tecnici obbligatori",
   def:[
    "I sistemi AI ad alto rischio non sono vietati: sono soggetti a un rigoroso iter normativo preventivo prima dell'immissione sul mercato.",
    "Categorie: biometria, infrastrutture critiche, istruzione, occupazione, accesso a servizi essenziali, prevenzione di reati, migrazione, amministrazione della giustizia.",
    "Soggetti obbligati: fornitore (sviluppa e immette), deployer (utilizza), importatore (introduce nell'UE), distributore (commercializza).",
   ],
   arg:[
    "Obblighi tecnici: governance dei dati di training (accurati, privi di bias), documentazione tecnica, log di funzionamento, trasparenza verso le autorità di controllo.",
    "La supervisione umana (human oversight) è il presidio giuridico centrale: una persona fisica deve sempre poter comprendere l'output, ignorarlo in caso di errore e spegnere il sistema (kill switch).",
    "Solo dopo apposita valutazione di conformità il sistema riceve la marcatura CE — senza di essa non può essere immesso sul mercato europeo.",
   ],
   caso:[
    "Selezione automatica dei CV: sistema ad alto rischio (settore occupazione) → la piattaforma è obbligata a offrire revisione umana al candidato scartato.",
    "Scoring creditizio algoritmico: ad alto rischio (accesso a servizi finanziari essenziali) → l'istituto deve offrire revisione umana del diniego del mutuo.",
    "Il kill switch non è una metafora: il sistema deve essere progettato per consentire fisicamente l'interruzione immediata del suo funzionamento da parte di un umano.",
   ]},
  {n:56, t:"AI Act — Modelli GPAI (LLM) — rischio sistemico — soglia FLOPs",
   def:[
    "I modelli GPAI (General Purpose AI): LLM come ChatGPT e Claude — dotati di 'generalità significativa', capaci di svolgere un'ampia gamma di compiti complessi.",
    "Tutti i fornitori GPAI: obblighi di trasparenza sul dataset di training (rispetto del copyright) e pubblicazione di una sintesi dettagliata dei contenuti utilizzati.",
    "Rischio sistemico: i modelli GPAI con addestramento cumulativo superiore a 10²⁵ FLOPs presentano capacità di impatto potenzialmente catastrofico.",
   ],
   arg:[
    "La soglia di 10²⁵ FLOPs è la presunzione matematica del rischio sistemico: superata quella soglia, il modello è presunto comportare un rischio sistemico.",
    "Obblighi aggiuntivi per i modelli a rischio sistemico: Red Teaming (simulazione di attacchi), monitoraggio incidenti gravi, condivisione informazioni con la Commissione.",
    "La governance del rischio sistemico è un obbligo continuativo: non basta ottenere il via libera al momento del lancio — il monitoraggio è permanente.",
   ],
   caso:[
    "GPT-4 (OpenAI) e Claude 3 Opus (Anthropic): modelli GPAI con potenziale rischio sistemico — soggetti agli obblighi più stringenti del Capo V AI Act.",
    "Il Red Teaming obbligatorio: simulazione sistematica di attacchi e vulnerabilità per identificare i rischi prima che si materializzino nella realtà.",
    "La condivisione di informazioni con la Commissione: i fornitori di modelli a rischio sistemico non possono gestire autonomamente gli incidenti gravi — devono notificarli.",
   ]},
  {n:57, t:"IA generativa — rischio specifico/limitato — deep fake — watermarking",
   def:[
    "I sistemi AI a rischio specifico o limitato non sono né vietati né ad alto rischio: sono soggetti a obblighi di trasparenza mirati.",
    "Rientrano in questa categoria: chatbot (che simulano conversazioni umane) e generatori di contenuti sintetici — testi, immagini, audio, video e deep fake.",
    "Deep fake: contenuti sintetici che replicano falsamente le fattezze, la voce o i comportamenti di una persona reale in modo non riconoscibile.",

function render() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  let totalP = 0;

  DATA.forEach(ch => {
    const div = document.createElement('div');
    div.className = 'chapter';
    div.setAttribute('data-c', ch.c);

    const qs = ch.qs.map(q => {
      const searchText = [q.t, ...q.def, ...q.arg, ...q.caso].join(' ').toLowerCase();
      const defH = q.def.map(p => `<div class="phrase">${p}</div>`).join('');
      const argH = q.arg.map(p => `<div class="phrase">${p}</div>`).join('');
      const casoH = q.caso.map(p => `<div class="phrase">${p}</div>`).join('');
      totalP += q.def.length + q.arg.length + q.caso.length;

      return `<div class="q-card" data-n="${q.n}" data-search="${searchText}">
        <div class="q-head" onclick="this.parentElement.classList.toggle('open')">
          <span class="q-n">${q.n}.</span>
          <span class="q-t">${q.t}</span>
          <span class="q-arr">▶</span>
        </div>
        <div class="q-body">
          <div class="block def">
            <span class="block-label">Definizione</span>
            <div class="phrases">${defH}</div>
          </div>
          <div class="block arg">
            <span class="block-label">Argomentazione</span>
            <div class="phrases">${argH}</div>
          </div>
          <div class="block caso">
            <span class="block-label">Caso Giudiziario</span>
            <div class="phrases">${casoH}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    div.innerHTML = `
      <div class="ch-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="ch-num">CAP. ${ch.c}</span>
        <span class="ch-title">${ch.title}</span>
        <span class="ch-badge">${ch.qs.length} domande</span>
        <span class="ch-arr">▾</span>
      </div>
      <div class="ch-body">${qs}</div>`;
    main.appendChild(div);
  });

  document.getElementById('totalPhrases').textContent = totalP;
}

document.getElementById('expandAll').addEventListener('click', () => {
  document.querySelectorAll('.q-card:not(.hidden)').forEach(c => c.classList.add('open'));
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('collapsed'));
});
document.getElementById('collapseAll').addEventListener('click', () => {
  document.querySelectorAll('.q-card').forEach(c => c.classList.remove('open'));
  document.querySelectorAll('.chapter').forEach(c => c.classList.add('collapsed'));
});

let hideActive = false;
document.getElementById('hideMode').addEventListener('click', function() {
  hideActive = !hideActive;
  document.body.classList.toggle('hide-mode', hideActive);
  this.classList.toggle('on', hideActive);
  this.textContent = hideActive ? '👁 MOSTRA TUTTO' : '🙈 NASCONDI FRASI';
  document.getElementById('hideStats').style.display = hideActive ? 'block' : 'none';
  if (!hideActive) {
    document.querySelectorAll('.phrase').forEach(p => p.classList.remove('shown'));
    document.getElementById('revealedCount').textContent = 0;
    document.getElementById('progressFill').style.width = '0%';
  }
});

document.addEventListener('click', e => {
  if (hideActive && e.target.classList.contains('phrase')) {
    e.target.classList.toggle('shown');
    const revealed = document.querySelectorAll('.phrase.shown').length;
    const total = parseInt(document.getElementById('totalPhrases').textContent);
    document.getElementById('revealedCount').textContent = revealed;
    document.getElementById('progressFill').style.width = (revealed / total * 100) + '%';
  }
});

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  let v = 0;
  document.querySelectorAll('.q-card').forEach(c => {
    const match = !q || c.getAttribute('data-search').includes(q);
    c.classList.toggle('hidden', !match);
    if (match) { v++; if (q) c.classList.add('open'); }
  });
  document.getElementById('visibleCount').textContent = v;
});

render();
</script>
